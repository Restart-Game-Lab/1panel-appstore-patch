name: Build PostgreSQL Patch

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1'  # Weekly Monday 4AM UTC

env:
  IMAGE_NAME: postgresql-patch
  SOURCE_REPO: Restart-Game-Lab/postgresql-patch
  SOURCE_BRANCH: main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - pg_version: "14.23"
            pgvector_version: "0.8.2"
          - pg_version: "15.18"
            pgvector_version: "0.8.2"
          - pg_version: "16.14"
            pgvector_version: "0.8.2"
          - pg_version: "17.10"
            pgvector_version: "0.8.2"
          - pg_version: "18.4"
            pgvector_version: "0.8.2"

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ env.SOURCE_BRANCH }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.pg_version }}-alpine-patch
            type=raw,value=latest,enable=${{ matrix.pg_version == '18.4' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./build
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PG_VERSION=${{ matrix.pg_version }}
            PGVECTOR_VERSION=${{ matrix.pgvector_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        run: |
          TAG="${{ matrix.pg_version }}-alpine-patch"
          docker pull ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${TAG}
          docker run --rm ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${TAG} sh -c "
            echo '=== PostgreSQL Version ==='
            postgres --version
            echo '=== pgvector Test ==='
            psql --version
            echo '=== Extensions Check ==='
            ls /usr/local/lib/postgresql/*.so 2>/dev/null || echo 'No .so in /usr/local/lib/postgresql'
            ls /usr/share/postgresql/extension/*.control 2>/dev/null || echo 'No .control in /usr/share/postgresql/extension'
          "
