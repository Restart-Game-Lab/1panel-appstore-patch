name: Build OpenResty Tongsuo

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1'  # Weekly Monday 4AM UTC

env:
  IMAGE_NAME: openresty-tongsuo
  SOURCE_REPO: Restart-Game-Lab/openresty-tongsuo
  SOURCE_BRANCH: main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - version: 1.31.1.1-0-noble
            tag_suffix: tongsuo

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ env.SOURCE_BRANCH }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.version }}-${{ matrix.tag_suffix }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./build
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ matrix.version }}-${{ matrix.tag_suffix }}
          docker run --rm ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ matrix.version }}-${{ matrix.tag_suffix }} sh -c "
            echo '=== Tongsuo Version ==='
            tongsuo version
            echo '=== SM2 Test ==='
            tongsuo genpkey -algorithm SM2 -out /dev/null 2>&1 && echo 'SM2 OK' || echo 'SM2 FAIL'
            echo '=== SM3 Test ==='
            echo -n test | tongsuo dgst -sm3 2>&1 | grep -q . && echo 'SM3 OK' || echo 'SM3 FAIL'
            echo '=== SM4 Test ==='
            echo -n test | tongsuo enc -sm4-ecb -nosalt -pass pass:test 2>&1 && echo 'SM4 OK' || echo 'SM4 FAIL'
            echo '=== OpenResty Version ==='
            openresty -v 2>&1
          "
