additionalProperties:
    supportVersion: 2.0
    formFields:
        - default: 80
          envKey: PANEL_APP_PORT_HTTP
          labelEn: HTTP Port
          required: true
          type: number
          label:
            en: HTTP Port
            es-es: Puerto HTTP
            ja: HTTP ポート
